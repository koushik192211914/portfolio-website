<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | Efficient Task Management</title>
    <!-- Google Fonts: Outfit for headers, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX support -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function Login({ onLogin }) {
            return (
                <div className="login-container">
                    <div className="login-card">
                        <h1>Welcome Back</h1>
                        <p>Select your profile to continue</p>
                        <div className="role-buttons">
                            <button onClick={() => onLogin('Admin')} className="role-btn admin">
                                <span className="icon">🛡️</span> Admin
                            </button>
                            <button onClick={() => onLogin('User1')} className="role-btn user">
                                <span className="icon">👤</span> User1
                            </button>
                            <button onClick={() => onLogin('User2')} className="role-btn user">
                                <span className="icon">👤</span> User2
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function Dashboard({ user, onLogout }) {
            return (
                <main className="app-container">
                    <header className="app-header">
                        <div className="user-info">
                            <span>Welcome, <strong>{user}</strong></span>
                            <button onClick={onLogout} className="logout-btn">Logout</button>
                        </div>
                        <h1>Task Manager Dashboard</h1>
                        <p>Stay organized, stay productive.</p>
                    </header>

                    <section className="task-sections">
                        <div className="task-column">
                            <h2>To Do</h2>
                            <div className="task-card">
                                <div className="task-status status-todo"></div>
                                <h3>Project Research</h3>
                                <p>Analyze competitor task management tools.</p>
                                <span className="due-date">Due: Apr 5</span>
                            </div>
                        </div>

                        <div className="task-column">
                            <h2>In Progress</h2>
                            <div className="task-card">
                                <div className="task-status status-progress"></div>
                                <h3>UI Design</h3>
                                <p>Drafting the glassmorphism layout for the dashboard.</p>
                                <span className="due-date">Due: Apr 3</span>
                            </div>
                        </div>

                        <div className="task-column">
                            <h2>Completed</h2>
                            <div className="task-card">
                                <div className="task-status status-done"></div>
                                <h3>Requirement Gathering</h3>
                                <p>Finalized the core feature list for V1.</p>
                                <span className="due-date">Completed</span>
                            </div>
                        </div>
                    </section>
                </main>
            );
        }

        function App() {
            const [user, setUser] = useState(null);

            const handleLogin = (role) => setUser(role);
            const handleLogout = () => setUser(null);

            return (
                <div className="root-inner">
                    {user ? (
                        <Dashboard user={user} onLogout={handleLogout} />
                    ) : (
                        <Login onLogin={handleLogin} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
