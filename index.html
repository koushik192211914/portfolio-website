<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | Efficient Task Management</title>
    <!-- Google Fonts: Outfit for headers, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX support -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Component } = React;

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="error-fallback">
                            <div className="error-card">
                                <h2>Oops! Something went wrong.</h2>
                                <p>The dashboard encountered an unexpected error.</p>
                                <button onClick={() => {
                                    localStorage.removeItem('tm_tasks');
                                    window.location.reload();
                                }} className="reset-btn">Reset & Recover</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function Login({ onLogin }) {
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (username === 'sarath' && password === '12345678') {
                    onLogin('Admin');
                } else {
                    setError('Invalid username or password');
                }
            };

            return (
                <div className="login-container">
                    <div className="login-card">
                        <h1>{isAdminMode ? 'Admin Portal' : 'Welcome Back'}</h1>
                        <p>{isAdminMode ? 'Please enter your credentials' : 'Select your profile to continue'}</p>

                        {!isAdminMode ? (
                            <div className="role-buttons">
                                <button onClick={() => setIsAdminMode(true)} className="role-btn admin">
                                    <span className="icon">🛡️</span> Admin Access
                                </button>
                                <div className="divider"><span>OR</span></div>
                                <button onClick={() => onLogin('User1')} className="role-btn user">
                                    <span className="icon">👤</span> User1
                                </button>
                                <button onClick={() => onLogin('User2')} className="role-btn user">
                                    <span className="icon">👤</span> User2
                                </button>
                            </div>
                        ) : (
                            <form className="admin-login-form" onSubmit={handleAdminLogin}>
                                <div className="form-group">
                                    <input
                                        type="text"
                                        placeholder="Username"
                                        value={username}
                                        onChange={(e) => setUsername(e.target.value)}
                                        required
                                    />
                                </div>
                                <div className="form-group">
                                    <input
                                        type="password"
                                        placeholder="Password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        required
                                    />
                                </div>
                                {error && <div className="login-error">{error}</div>}
                                <button type="submit" className="login-submit-btn">Login as Admin</button>
                                <button type="button" className="back-btn" onClick={() => {
                                    setIsAdminMode(false);
                                    setError('');
                                }}>← Back to Selection</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        const INITIAL_TASKS = [
            { id: 1, title: 'System Maintenance', desc: 'Server health check and updates.', status: 'Pending', role: 'Admin', due: '2026-04-01', priority: 'High', category: 'Work', createdBy: 'Admin' },
            { id: 2, title: 'Project Research', desc: 'Analyze competitor task management tools.', status: 'Pending', role: 'All', due: '2026-04-02', priority: 'Medium', category: 'Work', createdBy: 'Admin' },
            { id: 3, title: 'UI Design', desc: 'Drafting the glassmorphism layout.', status: 'Pending', role: 'All', due: '2026-04-03', priority: 'High', category: 'Study', createdBy: 'Admin' },
            { id: 4, title: 'Security Audit', desc: 'Review user access logs and permissions.', status: 'Pending', role: 'Admin', due: '2026-04-06', priority: 'Medium', category: 'Work', createdBy: 'Admin' },
            { id: 5, title: 'Requirement Gathering', desc: 'Finalized the core feature list.', status: 'Completed', role: 'All', due: 'Completed', priority: 'Low', category: 'Personal', createdBy: 'Admin' },
            { id: 6, title: 'API Integration', desc: 'Connect the frontend with the mock API.', status: 'Pending', role: 'User1', due: '2026-04-08', priority: 'Medium', category: 'Study', createdBy: 'Admin' },
            { id: 7, title: 'Database Cleanup', desc: 'Remove redundant records from dev db.', status: 'Pending', role: 'User2', due: '2026-04-07', priority: 'Low', category: 'Work', createdBy: 'Admin' }
        ];

        function Sidebar({ onLogout, onReset, onToggleTheme, currentTheme }) {
            return (
                <aside className="sidebar">
                    <div className="sidebar-logo">TaskMaster</div>
                    <nav className="sidebar-nav">
                        <a href="#" className="nav-item active"><span className="icon">📋</span> Tasks</a>
                        <button
                            onClick={onToggleTheme}
                            className="nav-item theme-toggle-btn"
                            title={`Switch to ${currentTheme === 'light' ? 'dark' : 'light'} mode`}
                            style={{ border: 'none', background: 'transparent', width: '100%', cursor: 'pointer', textAlign: 'left', font: 'inherit' }}
                        >
                            <span className="icon">{currentTheme === 'light' ? '🌙' : '☀️'}</span>
                            {currentTheme === 'light' ? 'Dark Mode' : 'Light Mode'}
                        </button>
                    </nav>
                    <div className="sidebar-footer">
                        <button onClick={onReset} className="reset-btn">Reset Dashboard</button>
                        <button className="logout-btn-large" onClick={onLogout} title="Logout">
                            <span className="icon">🚪</span>
                            <span className="btn-text">Logout</span>
                        </button>
                    </div>
                </aside>
            );
        }

        const MainHeader = ({ onSearch, onLogout, userRole }) => {
            return (
                <header className="main-header">
                    <div className="header-left">
                        <div className="header-title">
                            <h1>Welcome, <span className="role-text">{userRole === 'Admin' ? 'Admin' : 'User'}</span></h1>
                            <p>Manage your tasks and collaborate with ease.</p>
                        </div>
                    </div>

                    <div className="header-center">
                        <div className="search-wrapper">
                            <span className="search-icon">🔍</span>
                            <input
                                type="text"
                                placeholder="Search tasks, teammates..."
                                className="header-search"
                                onChange={(e) => onSearch(e.target.value)}
                            />
                        </div>
                    </div>

                    <div className="header-right">
                        <div className="header-actions">
                            <button className="icon-btn notification-btn" title="Notifications">
                                <span className="icon">🔔</span>
                                <span className="badge">3</span>
                            </button>
                            <button className="icon-btn logout-header-icon-btn" onClick={onLogout} title="Sign Out">
                                <span className="icon">🚪</span>
                            </button>
                        </div>
                        <div className="profile-info">
                            <div className={`avatar-ring ${userRole === 'Admin' ? 'admin' : 'user'}`}>
                                <div className="avatar">
                                    <span className={userRole === 'Admin' ? 'icon admin' : 'icon'}>
                                        {userRole === 'Admin' ? '🛡️' : '👤'}
                                    </span>
                                </div>
                            </div>
                            <div className="user-details">
                                <div className="user-top">
                                    <span className="user-name">{userRole} Profile</span>
                                </div>
                                <span className="user-status">Online</span>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        function TaskCard({ task, onToggleComplete, onDelete }) {
            const today = new Date().toISOString().split('T')[0];
            const isOverdue = task.status !== 'Completed' && task.due !== 'Completed' && task.due < today;

            return (
                <div key={task.id} className={`task-card ${task.status === 'Completed' ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}`}>
                    <div className="task-actions">
                        <button className="action-btn complete-btn" onClick={() => onToggleComplete(task.id)} title="Toggle Complete">
                            {task.status === 'Completed' ? '↩️' : '✔'}
                        </button>
                        <button className="action-btn delete-btn" onClick={() => onDelete(task.id)} title="Delete Task">×</button>
                    </div>
                    <div className={`task-status status-${(task.status || 'Pending').toLowerCase()}`}></div>
                    {task.status === 'Completed' && <div className="completed-badge">✓ Completed</div>}
                    {isOverdue && <div className="overdue-badge">⚠️ Overdue</div>}
                    <div className="task-header-row">
                        <h3>{task.title}</h3>
                        <div className="header-tags">
                            <span className={`priority-tag p-${(task.priority || 'Medium').toLowerCase()}`}>
                                {task.priority || 'Medium'}
                            </span>
                            <div className="category-tag">
                                {task.category === 'Work' && '💼'}
                                {task.category === 'Study' && '🎓'}
                                {task.category === 'Personal' && '🏠'}
                                {task.category || 'Personal'}
                            </div>
                        </div>
                    </div>
                    <span className="due-date">
                        <span className="icon">📅</span>
                        {task.due === 'New' && task.status === 'done' ? 'Completed' : task.due}
                    </span>
                    <p>{task.desc}</p>
                    <div className="task-meta">
                        <div className="ownership-info">
                            <div className="role-tag creator">
                                <span className="icon">✍️</span> {task.createdBy || 'Unknown'}
                            </div>
                            <div className="role-tag assignee">
                                <span className="icon">👤</span> {task.role === 'All' ? 'Everyone' : task.role}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function TaskStats({ total, completed, pending }) {
            return (
                <div className="stats-container">
                    <div className="stat-card total">
                        <div className="stat-info">
                            <span className="stat-label">Total Tasks</span>
                            <span className="stat-value">{total}</span>
                        </div>
                        <div className="stat-icon">📊</div>
                    </div>
                    <div className="stat-card pending">
                        <div className="stat-info">
                            <span className="stat-label">Pending</span>
                            <span className="stat-value">{pending}</span>
                        </div>
                        <div className="stat-icon">⏳</div>
                    </div>
                    <div className="stat-card completed">
                        <div className="stat-info">
                            <span className="stat-label">Completed</span>
                            <span className="stat-value">{completed}</span>
                        </div>
                        <div className="stat-icon">✅</div>
                    </div>
                </div>
            );
        }

        const TaskForm = ({ onAddTask, userRole }) => {
            const [title, setTitle] = useState('');
            const [assignedRole, setAssignedRole] = useState(userRole === 'Admin' ? 'All' : userRole);
            const [dueDate, setDueDate] = useState('');
            const [priority, setPriority] = useState('Medium');
            const [category, setCategory] = useState('Personal');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!title.trim() || !dueDate) return;
                onAddTask(title, assignedRole, dueDate, priority, category);
                setTitle('');
                setDueDate('');
                setPriority('Medium');
                setCategory('Personal');
                if (userRole === 'Admin') setAssignedRole('All');
            };

            return (
                <div className="task-creation-bar">
                    <form onSubmit={handleSubmit} className="add-task-form">
                        <input
                            type="text"
                            placeholder="What needs to be done?"
                            value={title}
                            onChange={(e) => setTitle(e.target.value)}
                            className="task-input"
                            required
                        />
                        {userRole === 'Admin' && (
                            <select
                                value={assignedRole}
                                onChange={(e) => setAssignedRole(e.target.value)}
                                className="role-select"
                            >
                                <option value="All">Assign to Everyone</option>
                                <option value="User1">Assign to User1</option>
                                <option value="User2">Assign to User2</option>
                            </select>
                        )}
                        <input
                            type="date"
                            value={dueDate}
                            onChange={(e) => setDueDate(e.target.value)}
                            className="date-input"
                            required
                        />
                        <select
                            value={priority}
                            onChange={(e) => setPriority(e.target.value)}
                            className="priority-select"
                        >
                            <option value="High">High Priority</option>
                            <option value="Medium">Medium Priority</option>
                            <option value="Low">Low Priority</option>
                        </select>
                        <select
                            value={category}
                            onChange={(e) => setCategory(e.target.value)}
                            className="category-select"
                        >
                            <option value="Work">🏢 Work</option>
                            <option value="Study">📚 Study</option>
                            <option value="Personal">🏠 Personal</option>
                        </select>
                        <button type="submit" className="add-task-btn">
                            <span className="icon">+</span> Add Task
                        </button>
                    </form>
                </div>
            );
        }

        function Dashboard({ user, onLogout, onToggleTheme, currentTheme }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [tasks, setTasks] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchTasks = async () => {
                    try {
                        const response = await fetch('https://todo-backend-c081.onrender.com/tasks');
                        const data = await response.json();

                        // Safety Check: Ensure data is an array before processing
                        if (!Array.isArray(data)) {
                            console.error('API Error: Expected array but received:', data);
                            setTasks([]);
                            return;
                        }

                        const normalizedTasks = data.map(t => ({
                            ...t,
                            status: t.status === 'done' ? 'Completed' : 'Pending',
                            role: t.assigned_to || 'All',
                            due: t.due_date || 'New',
                            desc: t.description || `Assigned to ${t.assigned_to || 'Everyone'}.`,
                            createdBy: t.created_by || 'Admin'
                        }));
                        setTasks(normalizedTasks);
                    } catch (error) {
                        console.error('Failed to fetch tasks:', error);
                        setTasks([]); // Set empty array to prevent crash
                    } finally {
                        setLoading(false);
                    }
                };
                fetchTasks();
            }, []);

            const handleAddTask = async (title, role, dueDate, priority, category) => {
                const isDuplicate = tasks?.some(t => t.title?.toLowerCase() === title.toLowerCase());
                if (isDuplicate) {
                    alert('A task with this title already exists!');
                    return;
                }

                try {
                    const response = await fetch("https://todo-backend-c081.onrender.com/addTask", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title,
                            assigned_to: role === 'All' ? null : role,
                            status: 'pending'
                        })
                    });
                    const data = await response.json();

                    const newTask = {
                        ...data.task,
                        status: 'Pending',
                        role: role,
                        due: dueDate,
                        desc: `Assigned to ${role}.`,
                        category: category,
                        createdBy: user
                    };
                    setTasks([newTask, ...tasks]);
                } catch (error) {
                    console.error('Failed to add task:', error);
                }
            };

            const handleDeleteTask = async (id) => {
                try {
                    await fetch(`https://todo-backend-c081.onrender.com/tasks/${id}`, { method: 'DELETE' });
                    setTasks(tasks.filter(task => task.id !== id));
                } catch (error) {
                    console.error('Failed to delete task:', error);
                }
            };

            const handleToggleComplete = async (id) => {
                try {
                    const response = await fetch(`https://todo-backend-c081.onrender.com/tasks/${id}/toggle`, { method: 'PUT' });
                    const data = await response.json();

                    setTasks(tasks.map(task =>
                        task.id === id
                            ? { ...task, status: data.status === 'done' ? 'Completed' : 'Pending' }
                            : task
                    ));
                } catch (error) {
                    console.error('Failed to toggle task:', error);
                }
            };

            const handleResetTasks = () => {
                if (confirm('Are you sure you want to reset all tasks? This will clear your saved data.')) {
                    localStorage.removeItem('tm_tasks');
                    window.location.reload();
                }
            };

            const filteredTasks = tasks.filter(task => {
                const matchesRole = user === 'Admin' || task.role === 'All' || task.role === user;
                const matchesSearch = task.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    task.desc.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesRole && matchesSearch;
            });

            const stats = {
                total: tasks.length,
                completed: tasks.filter(t => t.status === 'Completed').length,
                pending: tasks.filter(t => t.status === 'Pending').length
            };

            const renderColumn = (status, title) => {
                const columnTasks = filteredTasks.filter(t => t.status === status);
                return (
                    <div className="task-column">
                        <div className="column-header">
                            <h2>{title}</h2>
                            <span className="task-count">{columnTasks.length}</span>
                        </div>
                        <div className="column-body">
                            {columnTasks.length > 0 ? (
                                columnTasks.map(task => (
                                    <TaskCard
                                        key={task.id}
                                        task={task}
                                        onToggleComplete={handleToggleComplete}
                                        onDelete={handleDeleteTask}
                                    />
                                ))
                            ) : (
                                <div className="empty-state">
                                    <span className="empty-icon">📂</span>
                                    <p>No tasks found</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="app-layout">
                    <Sidebar onLogout={onLogout} onReset={handleResetTasks} onToggleTheme={onToggleTheme} currentTheme={currentTheme} />
                    <main className="main-content">
                        <MainHeader
                            onSearch={setSearchTerm}
                            onLogout={onLogout}
                            userRole={user}
                        />
                        <TaskStats {...stats} />
                        <TaskForm onAddTask={handleAddTask} userRole={user} />
                        <div className="task-filter-container">
                            <div className="filter-wrapper">
                                <span className="filter-icon">🔍</span>
                                <input
                                    type="text"
                                    placeholder="Filter tasks by name..."
                                    className="task-filter-input"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                {searchTerm && (
                                    <button onClick={() => setSearchTerm('')} className="clear-search">×</button>
                                )}
                            </div>
                        </div>
                        <div className="task-sections binary-layout">
                            {renderColumn('Pending', 'Pending Tasks')}
                            {renderColumn('Completed', 'Completed Tasks')}
                        </div>
                    </main>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [theme, setTheme] = useState(() => localStorage.getItem('tm_theme') || 'dark');

            useEffect(() => {
                document.body.className = theme === 'light' ? 'light-theme' : '';
                localStorage.setItem('tm_theme', theme);
            }, [theme]);

            const toggleTheme = () => {
                setTheme(prev => prev === 'light' ? 'dark' : 'light');
            };

            const handleLogin = (role) => {
                setUser(role);
                localStorage.setItem('tm_user', role);
            };

            const handleLogout = () => {
                if (confirm('Are you sure you want to log out?')) {
                    setUser(null);
                    localStorage.removeItem('tm_user');
                }
            };

            return (
                <ErrorBoundary>
                    <div className="app-container">
                        {!user ? (
                            <Login onLogin={handleLogin} />
                        ) : (
                            <Dashboard
                                user={user}
                                onLogout={handleLogout}
                                onToggleTheme={toggleTheme}
                                currentTheme={theme}
                            />
                        )}
                    </div>
                </ErrorBoundary>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
