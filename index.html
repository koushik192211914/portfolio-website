<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | Efficient Task Management</title>
    <!-- Google Fonts: Outfit for headers, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX support -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Component } = React;

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="error-fallback">
                            <div className="error-card">
                                <h2>Oops! Something went wrong.</h2>
                                <p>The dashboard encountered an unexpected error.</p>
                                <button onClick={() => {
                                    localStorage.removeItem('tm_tasks');
                                    window.location.reload();
                                }} className="reset-btn">Reset & Recover</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function Login({ onLogin }) {
            return (
                <div className="login-container">
                    <div className="login-card">
                        <h1>Welcome Back</h1>
                        <p>Select your profile to continue</p>
                        <div className="role-buttons">
                            <button onClick={() => onLogin('Admin')} className="role-btn admin">
                                <span className="icon">🛡️</span> Admin
                            </button>
                            <button onClick={() => onLogin('User1')} className="role-btn user">
                                <span className="icon">👤</span> User1
                            </button>
                            <button onClick={() => onLogin('User2')} className="role-btn user">
                                <span className="icon">👤</span> User2
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const INITIAL_TASKS = [
            { id: 1, title: 'System Maintenance', desc: 'Server health check and updates.', status: 'todo', role: 'Admin', due: 'Apr 10' },
            { id: 2, title: 'Project Research', desc: 'Analyze competitor task management tools.', status: 'todo', role: 'All', due: 'Apr 5' },
            { id: 3, title: 'UI Design', desc: 'Drafting the glassmorphism layout.', status: 'progress', role: 'All', due: 'Apr 3' },
            { id: 4, title: 'Security Audit', desc: 'Review user access logs and permissions.', status: 'progress', role: 'Admin', due: 'Apr 6' },
            { id: 5, title: 'Requirement Gathering', desc: 'Finalized the core feature list.', status: 'done', role: 'All', due: 'Completed' },
            { id: 6, title: 'API Integration', desc: 'Connect the frontend with the mock API.', status: 'todo', role: 'User1', due: 'Apr 8' },
            { id: 7, title: 'Database Cleanup', desc: 'Remove redundant records from dev db.', status: 'progress', role: 'User2', due: 'Apr 7' }
        ];

        function Sidebar({ onLogout, onReset }) {
            return (
                <aside className="sidebar">
                    <div className="sidebar-logo">TaskMaster</div>
                    <nav className="sidebar-nav">
                        <a href="#" className="nav-item active"><span className="icon">📋</span> Tasks</a>
                        <a href="#" className="nav-item"><span className="icon">📅</span> Calendar</a>
                        <a href="#" className="nav-item"><span className="icon">📊</span> Analytics</a>
                        <a href="#" className="nav-item"><span className="icon">⚙️</span> Settings</a>
                    </nav>
                    <div className="sidebar-footer">
                        <button onClick={onReset} className="reset-btn">Reset Dashboard</button>
                        <button onClick={onLogout} className="logout-btn-large">Logout</button>
                    </div>
                </aside>
            );
        }

        function MainHeader({ user, onLogout, searchTerm, onSearchChange }) {
            return (
                <header className="main-header">
                    <div className="header-left">
                        <h1 className="gradient-text">TaskMaster</h1>
                        <p className="welcome-text">Collaborative Workspace</p>
                    </div>

                    <div className="header-center">
                        <div className="search-wrapper">
                            <span className="search-icon">🔍</span>
                            <input
                                type="text"
                                placeholder="Search tasks, teammates..."
                                className="header-search"
                                value={searchTerm}
                                onChange={(e) => onSearchChange(e.target.value)}
                            />
                        </div>
                    </div>

                    <div className="header-right">
                        <div className="header-actions">
                            <div className="notification-bell">
                                <span className="bell-icon">🔔</span>
                                <span className="notification-badge">3</span>
                            </div>
                        </div>
                        <div className="profile-info">
                            <div className={`avatar-ring ${user === 'Admin' ? 'admin' : 'user'}`}>
                                <div className="avatar">
                                    <span className={user === 'Admin' ? 'icon admin' : 'icon'}>
                                        {user === 'Admin' ? '🛡️' : '👤'}
                                    </span>
                                </div>
                            </div>
                            <div className="user-details">
                                <div className="user-top">
                                    <span className="user-name">{user} Profile</span>
                                    <button onClick={onLogout} className="logout-link">Logout</button>
                                </div>
                                <span className="user-status">Online</span>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        function TaskCard({ task, onToggleComplete, onDelete }) {
            return (
                <div key={task.id} className={`task-card ${task.status === 'done' ? 'completed' : ''}`}>
                    <div className="task-actions">
                        <button className="action-btn complete-btn" onClick={() => onToggleComplete(task.id)} title="Toggle Complete">
                            {task.status === 'done' ? '↩️' : '✔'}
                        </button>
                        <button className="action-btn delete-btn" onClick={() => onDelete(task.id)} title="Delete Task">×</button>
                    </div>
                    <div className={`task-status status-${task.status}`}></div>
                    {task.status === 'done' && <div className="completed-badge">✓ Completed</div>}
                    <h3>{task.title}</h3>
                    <p>{task.desc}</p>
                    <div className="task-meta">
                        <div className="role-tag">
                            <span className="icon">👤</span> {task.role === 'All' ? 'Everyone' : task.role}
                        </div>
                        <span className="due-date">{task.due === 'New' && task.status === 'done' ? 'Completed' : task.due}</span>
                    </div>
                </div>
            );
        }

        function TaskForm({ onAddTask, userRole }) {
            const [title, setTitle] = useState('');
            const [assignedRole, setAssignedRole] = useState(userRole === 'Admin' ? 'All' : userRole);
            const [dueDate, setDueDate] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!title.trim() || !dueDate) return;
                onAddTask(title, assignedRole, dueDate);
                setTitle('');
                setDueDate('');
                if (userRole === 'Admin') setAssignedRole('All');
            };

            return (
                <div className="task-creation-bar">
                    <form onSubmit={handleSubmit} className="add-task-form">
                        <input
                            type="text"
                            placeholder="What needs to be done?"
                            value={title}
                            onChange={(e) => setTitle(e.target.value)}
                            className="task-input"
                            required
                        />
                        {userRole === 'Admin' && (
                            <select
                                value={assignedRole}
                                onChange={(e) => setAssignedRole(e.target.value)}
                                className="role-select"
                            >
                                <option value="All">Assign to Everyone</option>
                                <option value="User1">Assign to User1</option>
                                <option value="User2">Assign to User2</option>
                            </select>
                        )}
                        <input
                            type="date"
                            value={dueDate}
                            onChange={(e) => setDueDate(e.target.value)}
                            className="date-input"
                            required
                        />
                        <button type="submit" className="add-task-btn">
                            <span className="icon">+</span> Add Task
                        </button>
                    </form>
                </div>
            );
        }

        function Dashboard({ user, onLogout }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [tasks, setTasks] = useState(() => {
                try {
                    const savedTasks = localStorage.getItem('tm_tasks');
                    if (savedTasks) {
                        const parsed = JSON.parse(savedTasks);
                        if (Array.isArray(parsed)) return parsed;
                    }
                } catch (e) {
                    console.error("Failed to load tasks from localStorage:", e);
                }
                return INITIAL_TASKS;
            });

            useEffect(() => {
                localStorage.setItem('tm_tasks', JSON.stringify(tasks));
            }, [tasks]);

            const handleAddTask = (title, role, dueDate) => {
                const isDuplicate = tasks.some(t => t.title.toLowerCase() === title.toLowerCase());
                if (isDuplicate) {
                    alert('A task with this title already exists!');
                    return;
                }

                const newTask = {
                    id: Date.now(),
                    title: title,
                    desc: `Assigned to ${role}.`,
                    status: 'todo',
                    role: role,
                    due: dueDate
                };
                setTasks([newTask, ...tasks]);
            };

            const handleDeleteTask = (id) => {
                setTasks(tasks.filter(task => task.id !== id));
            };

            const handleToggleComplete = (id) => {
                setTasks(tasks.map(task =>
                    task.id === id
                        ? { ...task, status: task.status === 'done' ? 'todo' : 'done' }
                        : task
                ));
            };

            const handleResetTasks = () => {
                if (confirm('Are you sure you want to reset all tasks? This will clear your saved data.')) {
                    localStorage.removeItem('tm_tasks');
                    window.location.reload();
                }
            };

            const filteredTasks = tasks.filter(task => {
                const matchesRole = task.role === 'All' || task.role === user;
                const matchesSearch = task.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    task.desc.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesRole && matchesSearch;
            });

            const renderColumn = (status, title) => {
                const columnTasks = filteredTasks.filter(t => t.status === status);
                return (
                    <div className="task-column">
                        <div className="column-header">
                            <h2>{title}</h2>
                            <span className="task-count">{columnTasks.length}</span>
                        </div>
                        <div className="column-body">
                            {columnTasks.length > 0 ? (
                                columnTasks.map(task => (
                                    <TaskCard
                                        key={task.id}
                                        task={task}
                                        onToggleComplete={handleToggleComplete}
                                        onDelete={handleDeleteTask}
                                    />
                                ))
                            ) : (
                                <div className="empty-state">
                                    <span className="empty-icon">📂</span>
                                    <p>No tasks found</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="app-layout">
                    <Sidebar onLogout={onLogout} onReset={handleResetTasks} />
                    <main className="main-content">
                        <MainHeader
                            user={user}
                            onLogout={onLogout}
                            searchTerm={searchTerm}
                            onSearchChange={setSearchTerm}
                        />
                        <TaskForm onAddTask={handleAddTask} userRole={user} />
                        <div className="task-sections">
                            {renderColumn('todo', 'To Do')}
                            {renderColumn('progress', 'In Progress')}
                            {renderColumn('done', 'Completed')}
                        </div>
                    </main>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(() => localStorage.getItem('tm_user'));

            const handleLogin = (role) => {
                setUser(role);
                localStorage.setItem('tm_user', role);
            };

            const handleLogout = () => {
                if (confirm('Are you sure you want to log out?')) {
                    setUser(null);
                    localStorage.removeItem('tm_user');
                }
            };

            return (
                <ErrorBoundary>
                    <div className="app-container">
                        {!user ? <Login onLogin={handleLogin} /> : <Dashboard user={user} onLogout={handleLogout} />}
                    </div>
                </ErrorBoundary>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
