<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | Efficient Task Management</title>
    <!-- Google Fonts: Outfit for headers, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX support -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function Login({ onLogin }) {
            return (
                <div className="login-container">
                    <div className="login-card">
                        <h1>Welcome Back</h1>
                        <p>Select your profile to continue</p>
                        <div className="role-buttons">
                            <button onClick={() => onLogin('Admin')} className="role-btn admin">
                                <span className="icon">🛡️</span> Admin
                            </button>
                            <button onClick={() => onLogin('User1')} className="role-btn user">
                                <span className="icon">👤</span> User1
                            </button>
                            <button onClick={() => onLogin('User2')} className="role-btn user">
                                <span className="icon">👤</span> User2
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function Dashboard({ user, onLogout }) {
            const allTasks = [
                { id: 1, title: 'System Maintenance', desc: 'Server health check and updates.', status: 'todo', role: 'Admin', due: 'Apr 10' },
                { id: 2, title: 'Project Research', desc: 'Analyze competitor task management tools.', status: 'todo', role: 'All', due: 'Apr 5' },
                { id: 3, title: 'UI Design', desc: 'Drafting the glassmorphism layout.', status: 'progress', role: 'All', due: 'Apr 3' },
                { id: 4, title: 'Security Audit', desc: 'Review user access logs and permissions.', status: 'progress', role: 'Admin', due: 'Apr 6' },
                { id: 5, title: 'Requirement Gathering', desc: 'Finalized the core feature list.', status: 'done', role: 'All', due: 'Completed' },
                { id: 6, title: 'API Integration', desc: 'Connect the frontend with the mock API.', status: 'todo', role: 'User1', due: 'Apr 8' },
                { id: 7, title: 'Database Cleanup', desc: 'Remove redundant records from dev db.', status: 'progress', role: 'User2', due: 'Apr 7' }
            ];

            const filteredTasks = allTasks.filter(task => task.role === 'All' || task.role === user);

            const renderColumn = (status, title) => (
                <div className="task-column">
                    <h2>{title}</h2>
                    {filteredTasks.filter(t => t.status === status).map(task => (
                        <div key={task.id} className="task-card">
                            <div className={`task-status status-${task.status}`}></div>
                            {task.role !== 'All' && <div className="role-tag">{task.role}</div>}
                            <h3>{task.title}</h3>
                            <p>{task.desc}</p>
                            <span className="due-date">{task.due}</span>
                        </div>
                    ))}
                </div>
            );

            return (
                <main className="app-container">
                    <header className="app-header">
                        <div className="user-info">
                            <span>Welcome, <strong>{user}</strong></span>
                            <button onClick={onLogout} className="logout-btn">Logout</button>
                        </div>
                        <h1>Task Manager Dashboard</h1>
                        <p>{user === 'Admin' ? 'Administrator Control Panel' : 'Collaborative Workspace'}</p>
                    </header>

                    <section className="task-sections">
                        {renderColumn('todo', 'To Do')}
                        {renderColumn('progress', 'In Progress')}
                        {renderColumn('done', 'Completed')}
                    </section>
                </main>
            );
        }

        function App() {
            const [user, setUser] = useState(null);

            const handleLogin = (role) => setUser(role);
            const handleLogout = () => setUser(null);

            return (
                <div className="root-inner">
                    {user ? (
                        <Dashboard user={user} onLogout={handleLogout} />
                    ) : (
                        <Login onLogin={handleLogin} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
